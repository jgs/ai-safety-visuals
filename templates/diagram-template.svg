<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Safety Visuals diagram template</title>
  <desc id="desc">Dark neutral SVG template for source-backed AI safety explainers.</desc>
  <style>
    .bg { fill: #101512; }
